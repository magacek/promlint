# Realistic rules lifted from common kube-prometheus / node-exporter patterns.
# Mostly clean; a couple of intentional issues embedded to prove the linter
# catches things in real-world-shaped rule sets.
groups:
  - name: kubernetes-apps
    rules:
      - alert: KubePodCrashLooping
        expr: |
          max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m])
            * on(namespace, pod) group_left(cluster) max_over_time(
              kube_pod_info[5m]
            )
            > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: "Pod has been in CrashLoopBackOff for > 15m."
          runbook_url: "https://runbooks.example.com/pod-crashloop"

      - alert: KubeDeploymentReplicasMismatch
        expr: |
          (
            kube_deployment_spec_replicas{job="kube-state-metrics"}
              !=
            kube_deployment_status_replicas_available{job="kube-state-metrics"}
          ) and (
            changes(kube_deployment_status_replicas_updated{job="kube-state-metrics"}[10m]) == 0
          )
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Deployment replicas mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched expected replicas for 15m."
          runbook_url: "https://runbooks.example.com/deployment-replicas"

  - name: node-exporter
    rules:
      - alert: NodeFilesystemFillingUp
        expr: |
          (
            node_filesystem_avail_bytes{fstype!=""} /
            node_filesystem_size_bytes{fstype!=""} * 100 < 15
          ) and (
            predict_linear(node_filesystem_avail_bytes{fstype!=""}[6h], 24*60*60) < 0
          )
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Filesystem on {{ $labels.instance }} is predicted to fill in 24h"
          description: "{{ $labels.device }} on {{ $labels.instance }} has < 15% free and is trending down."
          runbook_url: "https://runbooks.example.com/fs-fill"

      # Intentional issue: no `for:` — would page on a single scrape blip.
      - alert: NodeClockNotSynchronising
        expr: node_timex_sync_status == 0
        labels:
          severity: warning
        annotations:
          summary: "Clock not synchronizing on {{ $labels.instance }}"
          description: "NTP sync status is 0."
          runbook_url: "https://runbooks.example.com/clock-sync"

  - name: prometheus.ladder
    rules:
      # A legitimate severity ladder: same expression, different thresholds
      # and severities. promlint should report this as the "ladder" variant
      # of duplicate-alert-expression (warning) so the author can confirm
      # intent rather than treating it as a bug.
      - alert: PromRemoteWriteBehindWarning
        expr: prometheus_remote_storage_samples_pending > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Remote write behind (warning)"
          description: "Remote write is falling behind."
          runbook_url: "https://runbooks.example.com/remote-write"

      # Intentional exact duplicate of the warning rule above (same threshold,
      # same severity) — promlint should flag this as a copy-paste bug, not
      # a ladder, because the severities are identical.
      - alert: PromRemoteWriteBehindDuplicate
        expr: prometheus_remote_storage_samples_pending > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Remote write behind (duplicate)"
          description: "Same expression, same severity — this is a mistake."
          runbook_url: "https://runbooks.example.com/remote-write"
